# Run the whole startup team from GitHub — no server needed.
#
# Setup (once):
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: ANTHROPIC_API_KEY   Value: your key
#
# Use it:
#   Repo → Actions → "Startup Team OS" → Run workflow → type your idea → Run.
#   The finished blueprint is attached as a downloadable artifact.

name: Startup Team OS

on:
  workflow_dispatch:
    inputs:
      idea:
        description: "Your business idea"
        required: true
        type: string
      effort:
        description: "Reasoning effort (lower = cheaper/faster)"
        required: false
        default: "high"
        type: choice
        options: ["low", "medium", "high", "xhigh", "max"]

jobs:
  build-blueprint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: startup-team-os
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run the startup team
        env:
          # Set whichever provider secret you use (OpenRouter or Anthropic).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: pin provider/model via repo variables (Settings → Variables).
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL }}
          AGENT_EFFORT: ${{ inputs.effort }}
        run: node src/cli.js "${{ inputs.idea }}"

      - name: Upload blueprint
        uses: actions/upload-artifact@v4
        with:
          name: startup-blueprint
          path: startup-team-os/runs/*.md
          if-no-files-found: error
