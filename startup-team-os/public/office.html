<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NEXUS HQ — 3D Virtual Office</title>
<style>
  :root {
    --panel: rgba(17, 21, 38, 0.86);
    --panel-solid: #12162a;
    --line: rgba(120, 150, 240, 0.22);
    --ink: #eef1ff;
    --muted: #8b9ac2;
    --idle: #566089;
    --work: #ffcf4a;
    --done: #37e0a0;
    --err: #ff6b6b;
    --boss: #b98bff;
    --accent: #6b8bff;
    --accent2: #37e0a0;
    --radius: 14px;
    --shadow: 0 16px 40px rgba(3,5,16,0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font: 14px/1.5 "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--ink); background: #eef0f4;
  }
  canvas { display: block; }
  #gl { position: fixed; inset: 0; z-index: 1; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(140,160,230,0.35); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); backdrop-filter: blur(10px);
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    position: fixed; inset: 0 0 auto 0; z-index: 30;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    padding: 14px 18px 26px;
    background: linear-gradient(180deg, rgba(7,10,20,0.96) 0%, rgba(7,10,20,0.75) 55%, rgba(7,10,20,0) 100%);
  }
  .brand { display: flex; align-items: center; gap: 9px; white-space: nowrap; }
  .brand .badge {
    width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-size: 17px;
    background: linear-gradient(155deg, var(--accent), #4a63d8);
    box-shadow: 0 4px 14px rgba(107,139,255,0.45);
  }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; color: #fff; line-height: 1.15; }
  header h1 small { display: block; font-size: 10.5px; font-weight: 500; color: var(--muted); letter-spacing: .4px; }
  header h1 span { color: var(--boss); }
  #idea {
    flex: 1; min-width: 220px; max-width: 520px;
    padding: 10px 14px; border-radius: 10px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--line); background: rgba(9,13,26,0.8); color: var(--ink);
    transition: border-color .15s, background .15s;
  }
  #idea:focus { outline: none; border-color: rgba(120,150,240,0.6); background: rgba(9,13,26,0.95); }
  #idea::placeholder { color: #5c6a92; }
  button {
    padding: 10px 18px; border-radius: 10px; border: 1px solid var(--line);
    background: rgba(24,32,60,0.85); color: var(--ink); cursor: pointer; font-weight: 600; font-size: 13.5px;
    font-family: inherit; transition: transform .12s, box-shadow .12s, background .12s, opacity .12s;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); background: rgba(34,44,78,0.9); }
  button:active:not(:disabled) { transform: translateY(0); }
  button.primary {
    background: linear-gradient(155deg, #7d9bff, #4a63d8); border-color: transparent; color: #fff;
    box-shadow: 0 6px 18px rgba(74,99,216,0.4);
  }
  button.primary:hover:not(:disabled) { box-shadow: 0 8px 22px rgba(74,99,216,0.55); }
  button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  #status {
    margin-left: auto; display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 600; color: #cdd8f5; white-space: nowrap;
    padding: 7px 13px; border-radius: 999px; background: rgba(10,14,28,0.7); border: 1px solid var(--line);
  }
  #status::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--idle);
    box-shadow: 0 0 0 3px rgba(86,96,137,0.25); transition: background .2s, box-shadow .2s;
  }
  #status.on::before { background: var(--work); box-shadow: 0 0 0 3px rgba(255,207,74,0.25); animation: pulse 1.2s ease-in-out infinite; }
  #status.ok::before { background: var(--done); box-shadow: 0 0 0 3px rgba(55,224,160,0.25); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

  /* ── Team roster ────────────────────────────────────────────────── */
  #roster {
    position: fixed; left: 16px; top: 78px; z-index: 20; width: 246px;
    padding: 12px; max-height: 58vh; overflow-y: auto;
  }
  #roster h2, #log h2, #hud .lbl {
    margin: 0 0 9px; font-size: 10.5px; color: var(--muted); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 700;
  }
  .roster-row {
    display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 9px;
    margin-bottom: 3px; transition: background .2s;
  }
  .roster-row.working { background: rgba(255,207,74,0.09); }
  .roster-row.done { background: rgba(55,224,160,0.07); }
  .roster-row .dot {
    width: 11px; height: 11px; border-radius: 50%; flex: none;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
  }
  .roster-row.working .dot { animation: pulse 1s ease-in-out infinite; }
  .roster-row .info { flex: 1; min-width: 0; }
  .roster-row .rname { font-size: 12.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roster-row .rrole { font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roster-row .rpill {
    font-size: 9.5px; font-weight: 700; letter-spacing: .3px; padding: 2.5px 8px; border-radius: 999px; flex: none;
    background: rgba(86,96,137,0.25); color: var(--muted);
  }
  .roster-row.working .rpill { background: rgba(255,207,74,0.18); color: var(--work); }
  .roster-row.done .rpill { background: rgba(55,224,160,0.18); color: var(--done); }
  .roster-row.error .rpill { background: rgba(255,107,107,0.18); color: var(--err); }
  #roster .boss-line {
    margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--line);
    font-size: 11.5px; color: var(--boss); display: flex; align-items: center; gap: 6px;
  }

  /* ── Activity log ───────────────────────────────────────────────── */
  #log {
    position: fixed; left: 16px; bottom: 16px; z-index: 20; width: 246px; max-height: 26vh; overflow-y: auto;
    padding: 12px;
  }
  #log .entry {
    font-size: 11.5px; padding: 5px 0 5px 10px; border-left: 2px solid var(--idle); margin-bottom: 2px;
    color: var(--muted);
  }
  #log .entry b { color: var(--ink); }
  #log .t { color: #5c6a92; font-variant-numeric: tabular-nums; margin-right: 4px; }
  #log .entry.ev-done { border-left-color: var(--done); }
  #log .entry.ev-start { border-left-color: var(--work); }
  #log .entry.ev-error { border-left-color: var(--err); }

  /* ── HUD ────────────────────────────────────────────────────────── */
  #hud {
    position: fixed; right: 16px; bottom: 16px; z-index: 20; min-width: 216px; text-align: right;
    padding: 14px 16px;
  }
  #hud .prov {
    font-size: 10.5px; color: var(--muted); margin-bottom: 8px; display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px; background: rgba(107,139,255,0.12); border: 1px solid rgba(107,139,255,0.25);
  }
  #stage { font-size: 13px; font-weight: 600; color: var(--ink); }
  #bar { height: 7px; border-radius: 4px; background: #10152a; margin: 10px 0 6px; overflow: hidden; border: 1px solid var(--line); }
  #bar i {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow: 0 0 10px rgba(55,224,160,0.5);
    transition: width .45s cubic-bezier(.4,0,.2,1);
  }
  #elapsed { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  #hud button { width: 100%; margin-top: 10px; }

  /* ── Modal ──────────────────────────────────────────────────────── */
  #modal { position: fixed; inset: 0; z-index: 40; display: none; place-items: center; background: rgba(4,6,14,0.78); backdrop-filter: blur(4px); }
  #modal.open { display: grid; }
  #modal .sheet { width: min(860px,92vw); max-height: 86vh; overflow: auto; background: var(--panel-solid);
    border: 1px solid var(--line); border-radius: 16px; padding: 22px 26px; box-shadow: var(--shadow); }
  #modal pre { white-space: pre-wrap; word-wrap: break-word; font: 13px/1.65 ui-monospace, Menlo, monospace; color: var(--ink); }
  #modal .row { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 14px; }

  .hint {
    position: fixed; left: 50%; bottom: 8px; transform: translateX(-50%); z-index: 10;
    color: #6b7aa0; font-size: 11px; text-align: center; pointer-events: none;
    background: rgba(10,14,28,0.55); padding: 4px 12px; border-radius: 999px;
  }

  @media (max-width: 860px) {
    #roster { display: none; }
  }
</style>
</head>
<body>
  <div id="gl"></div>

  <header>
    <div class="brand">
      <span class="badge">🏢</span>
      <h1>NEXUS <span>HQ</span><small>Live 3D agent office</small></h1>
    </div>
    <input id="idea" placeholder="Enter a business idea and watch your team build it…" />
    <button id="start" class="primary">▶ Run team</button>
    <button id="demo">Demo</button>
    <button id="assign" title="Give the team one task — the CEO routes it">🎯 Task</button>
    <button id="cfg" title="System settings" onclick="location.href='/settings'">⚙️</button>
    <span id="status">idle</span>
  </header>

  <aside id="roster" class="panel">
    <h2>Team</h2>
    <div id="rosterList"></div>
    <div class="boss-line">👑 You — watching live</div>
  </aside>

  <section id="log" class="panel"><h2>Activity feed</h2><div id="entries"></div></section>

  <aside id="hud" class="panel">
    <div class="lbl">Run status</div>
    <div class="prov" id="prov">provider —</div>
    <div id="stage">Stage 0 / 6 · ready</div>
    <div id="bar"><i></i></div>
    <div id="elapsed" class="t">00:00</div>
    <button id="view" disabled>📄 View blueprint</button>
  </aside>

  <div id="modal">
    <div class="sheet">
      <div class="row"><button id="download">⬇ Download .md</button><button id="close">Close</button></div>
      <pre id="bp"></pre>
    </div>
  </div>

  <div class="hint">Drag to orbit · scroll to zoom · click a teammate to focus (Esc resets) · the team wanders while idle and hustles when work lands — you are the boss 👑</div>

<script type="module">
import * as THREE from "./vendor/three.module.js";

// roundRect polyfill (Chrome/Edge <99, Safari <16, Firefox <112) — without
// this, makeLabel()'s draw() throws synchronously during scene setup and the
// whole office fails to render instead of just drawing square-cornered chips.
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.rect(x, y, w, h);
    return this;
  };
}

/* ════════════════════════════════════════════════════════════════════════
   TEAM ROSTER — names must match the server's agent names exactly.
   Each agent gets a workstation (x, z, ry) and a voxel outfit.
   ════════════════════════════════════════════════════════════════════════ */
const AGENTS = [
  { id:"ceo", name:"CEO Assistant", role:"Strategy · OKRs",
    seat:{ x:-6.4, z:-6.2, ry: Math.PI },
    outfit:{ color:0xe74c3c, tie:0x2c3e50 } },
  { id:"market", name:"Market Research Expert", role:"Competitors · Pricing",
    seat:{ x:-6.4, z:0.2, ry: Math.PI },
    outfit:{ color:0x3498db, glasses:true } },
  { id:"content", name:"Content Writer", role:"Copy · Campaigns",
    seat:{ x:0.0, z:3.0, ry: Math.PI },
    outfit:{ color:0xe91e8c, beret:0x8e44ad } },
  { id:"developer", name:"Developer", role:"Architecture · MVP",
    seat:{ x:6.4, z:-6.2, ry: Math.PI },
    outfit:{ color:0x2ecc71, glasses:true } },
  { id:"data", name:"Data Analyst", role:"Metrics · Forecasts",
    seat:{ x:6.4, z:0.2, ry: Math.PI },
    outfit:{ color:0xf1c40f, glasses:true } },
  { id:"sales", name:"Sales Expert", role:"Outreach · Closing",
    seat:{ x:-4.6, z:6.2, ry: Math.PI - 0.35 },
    outfit:{ color:0xe67e22, headset:true } },
  { id:"support", name:"Customer Support Agent", role:"Retention · FAQ",
    seat:{ x:4.6, z:6.2, ry: Math.PI + 0.35 },
    outfit:{ color:0x1abc9c, headset:true } },
];
const BOSS = { id:"boss", name:"YOU — The Boss", role:"Watching the team",
  pos:{ x:0, z:8.6, ry:Math.PI },
  outfit:{ color:0x9b59b6, crown:true, tie:0xf2c14e, scale:1.18 } };

/* ════════════════ Renderer · scene · camera · lights ════════════════ */
const container = document.getElementById("gl");

// Try to create a WebGL context. Some GPUs/drivers reject antialias or high
// power preference but still support a plain context, so retry with looser
// settings before giving up — most real desktop browsers succeed here.
let renderer;
for (const opts of [
  { antialias:true, preserveDrawingBuffer:true },
  { antialias:false, preserveDrawingBuffer:true, powerPreference:"default", failIfMajorPerformanceCaveat:false },
]) {
  try { renderer = new THREE.WebGLRenderer(opts); break; } catch (_) { /* try next */ }
}

if (!renderer) {
  // Never silently swap the page — show exactly what happened and let the
  // user choose, instead of redirecting them to a different-looking page
  // with no explanation.
  document.body.innerHTML = `
    <div style="min-height:100vh;display:grid;place-items:center;background:#0c1122;color:#e8edff;
      font:15px/1.6 system-ui,sans-serif;padding:24px;text-align:center;">
      <div style="max-width:440px;">
        <div style="font-size:40px;margin-bottom:12px;">🖥️⚠️</div>
        <h2 style="margin:0 0 10px;">This browser/GPU can't run the 3D office</h2>
        <p style="color:#93a3c8;">
          WebGL failed to initialize here — this is usually a sandboxed browser, a remote desktop,
          or GPU acceleration disabled in browser settings. A normal Chrome, Edge, or Firefox on
          your own machine should work fine.
        </p>
        <a href="/office-classic${location.search}" style="display:inline-block;margin-top:14px;
          padding:10px 20px;border-radius:10px;background:#4a63d8;color:#fff;text-decoration:none;font-weight:600;">
          Open the 2D fallback office instead →
        </a>
      </div>
    </div>`;
  throw new Error("WebGL unavailable — showed fallback notice instead of the 3D office.");
}
// Some embedded/headless environments report innerWidth 0 at load — never
// size the canvas to zero or every later drawImage/screenshot call breaks.
const viewW = () => window.innerWidth || document.documentElement.clientWidth || 1280;
const viewH = () => window.innerHeight || document.documentElement.clientHeight || 720;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(viewW(), viewH());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeef0f4);

const camera = new THREE.PerspectiveCamera(40, viewW() / viewH(), 0.1, 200);

scene.add(new THREE.HemisphereLight(0xffffff, 0xd8d2c8, 0.95));
const key = new THREE.DirectionalLight(0xffffff, 1.55);
key.position.set(18, 30, 14);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -18; key.shadow.camera.right = 18;
key.shadow.camera.top = 18; key.shadow.camera.bottom = -18;
key.shadow.camera.near = 5; key.shadow.camera.far = 70;
key.shadow.bias = -0.0004;
scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

/* ════════════════ Materials ════════════════ */
const M = {
  floor:  new THREE.MeshStandardMaterial({ color:0xd6d7d4, roughness:0.95 }),
  slab:   new THREE.MeshStandardMaterial({ color:0xf5f5f3, roughness:0.9 }),
  wall:   new THREE.MeshStandardMaterial({ color:0xf2f1ee, roughness:0.92 }),
  wood:   new THREE.MeshStandardMaterial({ color:0xc89a66, roughness:0.75 }),
  woodDark:new THREE.MeshStandardMaterial({ color:0x8a5f3c, roughness:0.8 }),
  chair:  new THREE.MeshStandardMaterial({ color:0x474b54, roughness:0.7 }),
  chairDk:new THREE.MeshStandardMaterial({ color:0x2e3138, roughness:0.6 }),
  glass:  new THREE.MeshStandardMaterial({ color:0xa8cde8, roughness:0.15, transparent:true, opacity:0.28 }),
  glassFrame: new THREE.MeshStandardMaterial({ color:0xbfc6cf, roughness:0.5 }),
  windowGlow: new THREE.MeshStandardMaterial({ color:0xbcd8f0, emissive:0x9fc4e8, emissiveIntensity:0.55, roughness:0.4 }),
  curtain:new THREE.MeshStandardMaterial({ color:0xe0a33c, roughness:0.85 }),
  plantGreen: new THREE.MeshStandardMaterial({ color:0x3e8e57, roughness:0.9 }),
  pot:    new THREE.MeshStandardMaterial({ color:0xb06a3a, roughness:0.85 }),
  dark:   new THREE.MeshStandardMaterial({ color:0x222a3d, roughness:0.6 }),
  white:  new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.8 }),
  cabinet:new THREE.MeshStandardMaterial({ color:0x6d4a30, roughness:0.8 }),
  gold:   new THREE.MeshStandardMaterial({ color:0xf2c14e, roughness:0.35, emissive:0x9a7418, emissiveIntensity:0.35 }),
  rug:    new THREE.MeshStandardMaterial({ color:0x8f6bd6, roughness:0.95, transparent:true, opacity:0.55 }),
  cooler: new THREE.MeshStandardMaterial({ color:0xdde4f0, roughness:0.6 }),
  coolerB:new THREE.MeshStandardMaterial({ color:0x9fd0f0, roughness:0.3, transparent:true, opacity:0.75 }),
};
const box = (w,h,d,mat) => new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
const cyl = (rt,rb,h,mat,seg=20) => new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
function shadowed(m, cast=true, receive=true){ m.castShadow=cast; m.receiveShadow=receive; return m; }

/* ════════════════ Environment — white cut-away office ════════════════ */
const FLOOR = 22, WALL_H = 3.1, WALL_T = 0.32, LOW_H = 0.62;

// ground shadow-catcher + white base slab + beige floor sheet
{
  const g = new THREE.Mesh(new THREE.PlaneGeometry(300,300), new THREE.ShadowMaterial({ opacity:0.14 }));
  g.rotation.x = -Math.PI/2; g.position.y = -0.36; g.receiveShadow = true; scene.add(g);
  const slab = shadowed(box(FLOOR+0.7, 0.36, FLOOR+0.7, M.slab), false, true);
  slab.position.y = -0.18; scene.add(slab);
  const sheet = shadowed(box(FLOOR, 0.06, FLOOR, M.floor), false, true);
  sheet.position.y = 0.03; scene.add(sheet);
}

function wallSeg(x, z, w, d, h, mat=M.wall) {
  const m = shadowed(box(w, h, d, mat), false, true);
  m.position.set(x, h/2, z);
  scene.add(m);
  return m;
}
const HALF = FLOOR/2;
// full back walls (away from default camera), low front walls (cut-away)
wallSeg(0, -HALF, FLOOR + WALL_T, WALL_T, WALL_H);            // back
wallSeg(-HALF, 0, WALL_T, FLOOR + WALL_T, WALL_H);            // left
wallSeg(HALF, 3.2, WALL_T, FLOOR - 6.2, LOW_H);               // right (low)
wallSeg(HALF, -8.15, WALL_T, 5.8, WALL_H);                    // right back corner (tall stub)
wallSeg(0, HALF, FLOOR + WALL_T, WALL_T, LOW_H);              // front (low)

// interior partitions → CEO office (back-left) and Dev room (back-right)
wallSeg(-7.6, -3.2, 6.8, 0.26, 2.6);        // CEO room front wall (door gap to its right)
wallSeg(-2.6, -7.2, 0.26, 7.6, 2.6);        // CEO room side wall
wallSeg(7.4, -3.2, 7.2, 0.26, 2.6);         // Dev room front wall (door gap to its left)
wallSeg(2.6, -7.2, 0.26, 7.6, 2.6);         // Dev room side wall
// glass partition between the door gaps (center corridor)
{
  const glass = shadowed(box(3.4, 2.1, 0.08, M.glass), false, false);
  glass.position.set(0, 1.05, -3.2); scene.add(glass);
  const frame = shadowed(box(3.5, 0.1, 0.12, M.glassFrame), false, false);
  frame.position.set(0, 2.12, -3.2); scene.add(frame);
  const base = shadowed(box(3.5, 0.1, 0.12, M.glassFrame), false, false);
  base.position.set(0, 0.06, -3.2); scene.add(base);
}

// floor-to-ceiling glass window wall (modern office daylight)
function sidePane(z, w) {
  const g = new THREE.Group();
  const frame = box(0.14, 2.85, w, M.white);
  const glass = box(0.06, 2.6, w - 0.24, M.windowGlow);
  glass.position.x = 0.06;
  g.add(frame, glass);
  g.position.set(-HALF + WALL_T/2 + 0.02, 1.45, z);
  scene.add(g);
}
sidePane(-8.2, 2.3); sidePane(-5.7, 2.3); sidePane(-3.2, 2.3); sidePane(0.2, 2.3); sidePane(3.4, 2.3); sidePane(6.6, 2.3);
function backPane(x, w) {
  const g = new THREE.Group();
  const frame = box(w, 2.85, 0.14, M.white);
  const glass = box(w - 0.24, 2.6, 0.06, M.windowGlow);
  glass.position.z = 0.06;
  g.add(frame, glass);
  g.position.set(x, 1.45, -HALF + WALL_T/2 + 0.02);
  scene.add(g);
}
backPane(-8.6, 2.2); backPane(-6.1, 2.2); backPane(5.8, 2.2); backPane(8.3, 2.2);

// NEXUS HQ wall logo (canvas texture)
{
  const c = document.createElement("canvas"); c.width = 512; c.height = 128;
  const x = c.getContext("2d");
  x.fillStyle = "#2a3b7a"; x.font = "bold 72px system-ui, sans-serif";
  x.textAlign = "center"; x.textBaseline = "middle";

const dash = (() => {
  const c = document.createElement("canvas"); c.width = 640; c.height = 400;
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const g = new THREE.Group();
  // flat against the tall right-side wall stub (x = HALF, centered near z = -8.15)
  // sized like a real 43" office monitor, not a room-height monolith.
  const bezel = box(0.1, 1.02, 1.62, M.dark);
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.9), new THREE.MeshBasicMaterial({ map: tex }));
  screen.rotation.y = -Math.PI / 2;
  screen.position.x = -0.052;
  const mount = box(0.14, 0.1, 0.3, M.dark); mount.position.x = 0.05;
  g.add(bezel, screen, mount);
  g.position.set(HALF - WALL_T / 2 - 0.02, 1.9, -8.15);
  scene.add(g);
  const draw = (done, total, label) => {
    const x = c.getContext("2d");
    x.fillStyle = "#f7f8fa"; x.fillRect(0, 0, 640, 400);
    x.fillStyle = "#1d2740"; x.font = "bold 44px system-ui, sans-serif"; x.textAlign = "left";
    x.fillText("PROJECT STATUS", 36, 72);
    x.fillStyle = "#5a6a8c"; x.font = "24px system-ui, sans-serif";
    x.fillText(String(label).slice(0, 34), 36, 112);
    x.fillStyle = "#4a63d8"; x.font = "bold 130px system-ui, sans-serif";
    x.fillText(String(done), 36, 260);
    x.fillStyle = "#8ea0c8"; x.font = "26px system-ui, sans-serif";
    x.fillText("of " + total + " agents done", 36, 300);
    x.strokeStyle = "#e2e6ef"; x.lineWidth = 2;
    x.strokeRect(330, 150, 280, 200);
    x.strokeStyle = "#37e0a0"; x.lineWidth = 6; x.beginPath();
    for (let i = 0; i <= 7; i++) {

    tex.needsUpdate = true;
  };
  draw(0, 7, "ready");
  return { draw };
})();

/* ════════════════ Jelly-blob characters (smooth, team-colored) ════════ */
function buildCharacter(o) {
  const s = o.scale || 1;
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color:o.color, roughness:0.35, metalness:0.05 });
  const darkMat = new THREE.MeshStandardMaterial({ color:0x222a3d, roughness:0.5 });
  const whiteMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.3 });
  const mat = (c) => new THREE.MeshStandardMaterial({ color:c, roughness:0.5 });

  // one smooth capsule is both head and body — classic jelly-person look
  const body = shadowed(new THREE.Mesh(new THREE.CapsuleGeometry(0.42, 0.55, 8, 24), bodyMat));
  body.position.y = 0.85;
  g.add(body);

  // stubby feet
  for (const sx of [-0.18, 0.18]) {
    const foot = shadowed(new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 12), bodyMat));
    foot.scale.set(1, 0.55, 1.25);
    foot.position.set(sx, 0.09, 0.06);
    g.add(foot);
  }

  // arms — capsules pivoted at the shoulder so they can type and cheer
  const armGeo = new THREE.CapsuleGeometry(0.11, 0.32, 6, 14);
  armGeo.translate(0, -0.24, 0);
  const armL = new THREE.Group(), armR = new THREE.Group();
  const armLm = shadowed(new THREE.Mesh(armGeo, bodyMat));
  const armRm = shadowed(new THREE.Mesh(armGeo.clone(), bodyMat));
  armL.add(armLm); armR.add(armRm);
  armL.position.set(-0.44, 1.05, 0); armR.position.set(0.44, 1.05, 0);
  armL.rotation.z = 0.25; armR.rotation.z = -0.25;
  g.add(armL, armR);

  // face group — big friendly eyes; role accessories mount here
  const headG = new THREE.Group();
  headG.position.y = 1.18;
  for (const sx of [-0.15, 0.15]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 12), whiteMat);
    eye.position.set(sx, 0.02, 0.36);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.042, 12, 10), darkMat);
    pupil.position.set(sx, 0.02, 0.435);
    headG.add(eye, pupil);
  }

  if (o.glasses) {
    const rimL = new THREE.Mesh(new THREE.TorusGeometry(0.115, 0.022, 10, 22), darkMat);
    rimL.position.set(-0.15, 0.02, 0.42);
    const rimR = new THREE.Mesh(new THREE.TorusGeometry(0.115, 0.022, 10, 22), darkMat);
    rimR.position.set(0.15, 0.02, 0.42);
    const bridge = box(0.09, 0.025, 0.025, darkMat); bridge.position.set(0, 0.05, 0.43);
    headG.add(rimL, rimR, bridge);
  }
  if (o.headset) {
    const band = new THREE.Mesh(new THREE.TorusGeometry(0.47, 0.045, 8, 24, Math.PI), darkMat);
    band.position.y = 0.1;
    const cupL = new THREE.Mesh(new THREE.SphereGeometry(0.11, 12, 10), darkMat);
    cupL.scale.x = 0.6; cupL.position.set(-0.46, 0.08, 0);
    const cupR = cupL.clone(); cupR.position.x = 0.46;
    const mic = box(0.03, 0.03, 0.3, darkMat);
    mic.position.set(0.34, -0.14, 0.2); mic.rotation.y = 0.45;
    headG.add(band, cupL, cupR, mic);
  }
  if (o.beret) {
    const be = new THREE.Mesh(new THREE.SphereGeometry(0.3, 18, 12), mat(o.beret));
    be.scale.set(1.15, 0.45, 1.15);
    be.position.set(0.06, 0.42, 0);
    be.rotation.z = 0.16;
    const stem = cyl(0.025, 0.025, 0.08, mat(o.beret)); stem.position.set(0.06, 0.56, 0);
    headG.add(be, stem);
  }
  if (o.crown) {
    const cr = cyl(0.24, 0.28, 0.2, M.gold, 8);
    cr.position.y = 0.52;
    const jewel = box(0.08, 0.08, 0.03, new THREE.MeshStandardMaterial({ color:0xd6455f, emissive:0x8a1f34, emissiveIntensity:0.5 }));
    jewel.position.set(0, 0.52, 0.26);
    headG.add(cr, jewel);
  }
  if (o.tie) {
    const knot = box(0.1, 0.08, 0.05, mat(o.tie)); knot.position.set(0, 0.98, 0.40); knot.rotation.x = 0.15;
    const tail = box(0.09, 0.3, 0.05, mat(o.tie)); tail.position.set(0, 0.8, 0.43); tail.rotation.x = 0.12;
    g.add(knot, tail);
  }

  g.add(headG);
  g.scale.setScalar(s);
  return { group:g, armL, armR, head:headG, torso:body };
}

/* ════════════════ Name labels (canvas sprites) ════════════════ */
const STATE_STYLE = {
  idle:    { chip:"idle",     color:"#8ea0c8", bg:"rgba(70,80,110,0.45)" },
  working: { chip:"working…", color:"#ffcf4a", bg:"rgba(255,207,74,0.2)" },
  done:    { chip:"done ✓",   color:"#37e0a0", bg:"rgba(55,224,160,0.2)" },
  error:   { chip:"error",    color:"#ff6b6b", bg:"rgba(255,107,107,0.22)" },
  boss:    { chip:"👑 boss",  color:"#e6c8ff", bg:"rgba(185,139,255,0.25)" },
};
function makeLabel(name, role) {
  const c = document.createElement("canvas"); c.width = 512; c.height = 200;
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.renderOrder = 10;
  sp.scale.set(2.7, 1.05, 1);
  const draw = (state) => {
    const st = STATE_STYLE[state] || STATE_STYLE.idle;
    const x = c.getContext("2d");
    x.clearRect(0, 0, 512, 200);
    x.fillStyle = "rgba(12,17,34,0.85)";
    x.beginPath(); x.roundRect(16, 12, 480, 176, 22); x.fill();
    x.strokeStyle = st.color; x.lineWidth = 3; x.stroke();
    x.fillStyle = "#e8edff"; x.font = "bold 40px system-ui, sans-serif";
    x.textAlign = "center";
    x.fillText(name, 256, 68, 450);
    x.fillStyle = "#93a3c8"; x.font = "28px system-ui, sans-serif";
    x.fillText(role, 256, 108, 450);
    // chip
    x.fillStyle = st.bg;
    x.beginPath(); x.roundRect(160, 128, 192, 44, 22); x.fill();
    x.fillStyle = st.color; x.font = "bold 27px system-ui, sans-serif";
    x.fillText(st.chip, 256, 159);
    tex.needsUpdate = true;
  };
  return { sprite:sp, draw };
}

const desired = { target: new THREE.Vector3(0, 0.6, 0), r: 27 };
let dragging = false, moved = 0, px = 0, py = 0, lastInteract = 0;

const dom = renderer.domElement;
dom.style.touchAction = "none"; // let us own single-finger drag (orbit) instead of the browser (pull-to-refresh / scroll)
dom.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return; // left/primary only — ignore right/middle click and secondary touch points
  dragging = true; moved = 0; px = e.clientX; py = e.clientY; lastInteract = performance.now();
});
window.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  const dx = e.clientX - px, dy = e.clientY - py;
  moved += Math.abs(dx) + Math.abs(dy);
  px = e.clientX; py = e.clientY;
  orbit.theta -= dx * 0.0055;
  orbit.phi = THREE.MathUtils.clamp(orbit.phi - dy * 0.0045, 0.35, 1.35);
  lastInteract = performance.now();
});
window.addEventListener("pointerup", (e) => {
  if (dragging && moved < 6) pick(e);
  dragging = false;
});
// A browser-claimed gesture (pinch-zoom, edge-swipe) fires pointercancel with
// no pointerup — without this, "dragging" sticks true and the camera orbits
// on the next unrelated pointer move.
window.addEventListener("pointercancel", () => { dragging = false; });
dom.addEventListener("wheel", (e) => {
  desired.r = THREE.MathUtils.clamp(desired.r * (1 + e.deltaY * 0.0011), 9, 48);
  lastInteract = performance.now();
}, { passive:true });
window.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  const modal = document.getElementById("modal");
  if (modal.classList.contains("open")) modal.classList.remove("open");
  else resetFocus();
});

const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function pick(e) {
  ndc.set((e.clientX / viewW()) * 2 - 1, -(e.clientY / viewH()) * 2 + 1);
  ray.setFromCamera(ndc, camera);
  const hit = ray.intersectObjects(clickables, false)[0];
  if (hit) {
    const name = hit.object.userData.agentName;
    const st = stations[name];
    const p = new THREE.Vector3();
    (st.isBoss ? st.char.group : st.group).updateMatrixWorld();
    if (st.isBoss) st.char.group.getWorldPosition(p);
    else st.unit.getWorldPosition(p);
    desired.target.set(p.x, 1.1, p.z);
    desired.r = 8.5;
    log(`👁 focusing on <b>${name}</b>`);
  } else resetFocus();
}
function resetFocus() { desired.target.set(0, 0.6, 0); desired.r = 27; }

window.addEventListener("resize", () => {
  camera.aspect = viewW() / viewH();
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // re-read DPR (window moved across monitors / zoom changed)
  renderer.setSize(viewW(), viewH());
});

/* ════════════════ States & animation ════════════════ */
const RING_COLORS = { idle:0x8ea0c8, working:0xffcf4a, done:0x37e0a0, error:0xff6b6b };

function setState(name, state) {
  const st = stations[name];
  if (!st || st.isBoss) return;
  st.state = state;
  const key = state || "idle";
  if (st.ringMat) { st.ringMat.color.setHex(RING_COLORS[key] || RING_COLORS.idle); }
  if (st.screenMat) {
    if (state === "working") { st.screenMat.emissive.setHex(0xffcf4a); st.screenMat.emissiveIntensity = 1.1; }
    else if (state === "done") { st.screenMat.emissive.setHex(0x37e0a0); st.screenMat.emissiveIntensity = 0.8; }
    else if (state === "error") { st.screenMat.emissive.setHex(0xff6b6b); st.screenMat.emissiveIntensity = 0.9; }
    else { st.screenMat.emissive.setHex(0x0a1226); st.screenMat.emissiveIntensity = 0.6; }
  }
  if (state === "done") st.cheerT = 1.4;
  st.label.draw(key);

  const r = rosterRows[name];
  if (r) {
    r.row.className = "roster-row" + (state ? " " + state : "");
    r.pill.textContent = key === "working" ? "working…" : key === "done" ? "done ✓" : key === "error" ? "error" : "idle";
  }
}

/* confetti when the blueprint lands */
function disposeGroup(group) {
  group.traverse(m => { if (m.isMesh) { m.geometry?.dispose(); m.material?.dispose(); } });
}
let confetti = null;
function dropConfetti() {
  if (confetti) { scene.remove(confetti.group); disposeGroup(confetti.group); confetti = null; }  // no orphaned batches
  const colors = [0x6b8bff, 0x37e0a0, 0xffcf4a, 0xff6b6b, 0xb98bff];
  const group = new THREE.Group();
  const pieces = [];
  for (let i = 0; i < 110; i++) {
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(0.14, 0.09),
      new THREE.MeshBasicMaterial({ color: colors[i % colors.length], side:THREE.DoubleSide })
    );
    m.position.set((Math.random()-0.5)*18, 7 + Math.random()*5, (Math.random()-0.5)*18);
    m.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    pieces.push({ m, v: 1.4 + Math.random()*1.6, r: (Math.random()-0.5)*4 });
    group.add(m);
  }
  scene.add(group);
  confetti = { group, pieces, t: 0 };
}

/* ════════════ Living office — idle wandering & boss patrol ════════════ */
// Safe standing spots on the open floor (world coords): water cooler, meeting
// table, whiteboard, printer, window wall, corridor lanes.
const OPEN_POIS = [ [8.7,2.5],[6.6,7.8],[-2.6,-0.6],[-7.8,7.6],[-9.2,2.4],[0.2,0.6],[2.4,1.4],[-2.2,4.6],[9.0,6.2] ];
// Room-bound agents wander inside their own office so nobody walks through walls.
const ZONE_POIS = {
  ceo:       [ [-8.8,-5.2],[-5.2,-8.8],[-9.2,-8.6],[-4.8,-5.6] ],
  developer: [ [8.8,-5.2],[5.2,-8.6],[9.0,-7.8],[4.8,-5.4] ],
};
function pickPOI(st) {
  const list = ZONE_POIS[st.id] || OPEN_POIS;
  const p = list[Math.floor(Math.random() * list.length)];
  return { x: p[0] + (Math.random() - 0.5) * 0.9, z: p[1] + (Math.random() - 0.5) * 0.9 };
}
// Desk agents live inside their (rotated) desk group — convert world→local.
const _wv = new THREE.Vector3();
function toLocal(st, wx, wz) {
  if (st.isBoss) return { x: wx, z: wz };
  st.group.updateMatrixWorld();
  st.group.worldToLocal(_wv.set(wx, 0, wz));
  return { x: _wv.x, z: _wv.z };
}
// The boss walks over to watch whoever is working right now.
function bossWatchPoint() {
  const working = Object.values(stations).filter(x => !x.isBoss && x.state === "working");
  if (!working.length) return null;
  const target = working[Math.floor(Math.random() * working.length)];
  target.group.updateMatrixWorld();
  const p = target.group.localToWorld(new THREE.Vector3(0, 0, 2.6));
  return { x: p.x, z: p.z };
}
// Returns true while the character is on the move this frame.
function updateWander(st, dt, t) {
  const w = st.wander;
  if (!w) return false;
  const mover = st.isBoss ? st.char.group : st.unit;
  const busy = !st.isBoss && (st.state === "working" || st.cheerT > 0);

  if (busy) w.target = { x: w.home.x, z: w.home.z, home: true, fast: true }; // work arrived → hustle back

  if (st.isBoss) {
    w.wait -= dt;
    if (w.wait <= 0) {
      const wp = bossWatchPoint();
      if (wp) w.target = wp;
      else if (Math.random() < 0.5) w.target = { x: w.home.x, z: w.home.z, home: true };
      else { const p = pickPOI(st); w.target = { x: p.x, z: p.z }; }
      w.wait = 5 + Math.random() * 5;
    }
  } else if (!busy && !w.target) {
    w.wait -= dt;
    if (w.wait <= 0) {
      const away = Math.hypot(mover.position.x - w.home.x, mover.position.z - w.home.z) > 0.3;
      if (away && Math.random() < 0.55) {
        w.target = { x: w.home.x, z: w.home.z, home: true };
      } else {
        const p = pickPOI(st);
        const l = toLocal(st, p.x, p.z);
        w.target = { x: l.x, z: l.z };
      }
      w.wait = 4 + Math.random() * 9;
    }
  }

  if (!w.target) return false;
  const dx = w.target.x - mover.position.x, dz = w.target.z - mover.position.z;
  const dist = Math.hypot(dx, dz);
  if (dist < 0.12) {
    const arrivedHome = !!w.target.home;
    w.target = null;
    if (arrivedHome && !st.isBoss) mover.rotation.y = w.home.ry;  // face the desk again
    return false;
  }
  const speed = (w.target.fast ? 2.1 : 1) * w.speed;
  const step = Math.min(dist, speed * dt);
  mover.position.x += (dx / dist) * step;
  mover.position.z += (dz / dist) * step;
  mover.rotation.y = Math.atan2(dx, dz);
  // waddle-walk
  st.char.group.position.y = (st.isBoss ? 0.05 : 0) + Math.abs(Math.sin(t * 9 + st.phase)) * 0.055;
  st.char.group.rotation.z = Math.sin(t * 9 + st.phase) * 0.07;
  return true;
}

const clock = new THREE.Clock();
let simT = 0; // simulated time — advanced by rAF normally, or by __office.step() in tests
function tick(dt) {
  simT += dt;
  const t = simT;

  for (const name in stations) {
    const st = stations[name];
    const ch = st.char;
    const p = st.phase;

    if (st.isBoss) {
      const walking = updateWander(st, dt, t);
      if (!walking) {
        ch.head.rotation.y = Math.sin(t * 0.45 + p) * 0.5;    // surveying the room
        ch.group.position.y = 0.08 + Math.sin(t * 1.4) * 0.012;
        ch.group.rotation.z += (0 - ch.group.rotation.z) * 0.15;
      } else {
        ch.head.rotation.y += (0 - ch.head.rotation.y) * 0.12;
      }
      st.label.sprite.position.set(ch.group.position.x, 2.7, ch.group.position.z);
      continue;
    }
    const walking = updateWander(st, dt, t);
    if (st.cheerT > 0) {                                        // finished → cheer!
      st.cheerT -= dt;
      const k = Math.max(st.cheerT, 0);
      ch.armL.rotation.set(-2.7, 0, 0.35 + Math.sin(t*14)*0.18);
      ch.armR.rotation.set(-2.7, 0, -0.35 - Math.sin(t*14)*0.18);
      if (!walking) ch.group.position.y = Math.abs(Math.sin(t * 9)) * 0.16 * (k / 1.4);
      ch.head.rotation.x = -0.18;
    } else if (walking) {                                       // on the move — arms swing
      ch.armL.rotation.x = Math.sin(t * 9 + p) * 0.55;
      ch.armR.rotation.x = Math.sin(t * 9 + p + Math.PI) * 0.55;
      ch.armL.rotation.z += (0.18 - ch.armL.rotation.z) * 0.2;
      ch.armR.rotation.z += (-0.18 - ch.armR.rotation.z) * 0.2;
      ch.head.rotation.x += (0 - ch.head.rotation.x) * 0.15;
      ch.head.rotation.y += (0 - ch.head.rotation.y) * 0.15;
    } else if (st.state === "working") {                        // typing at the desk
      ch.armL.rotation.x = -1.05 + Math.sin(t * 9 + p) * 0.2;
      ch.armR.rotation.x = -1.05 + Math.sin(t * 9 + p + Math.PI) * 0.2;
      ch.armL.rotation.z = 0.08; ch.armR.rotation.z = -0.08;
      ch.head.rotation.x = 0.14 + Math.sin(t * 3 + p) * 0.05;
      ch.head.rotation.y = Math.sin(t * 1.1 + p) * 0.06;
      ch.group.position.y = Math.sin(t * 8 + p) * 0.012;
    } else {                                                    // idle sway
      ch.armL.rotation.x += (0 - ch.armL.rotation.x) * 0.08;
      ch.armR.rotation.x += (0 - ch.armR.rotation.x) * 0.08;
      ch.armL.rotation.z += (0.25 - ch.armL.rotation.z) * 0.08;
      ch.armR.rotation.z += (-0.25 - ch.armR.rotation.z) * 0.08;
      ch.head.rotation.x += (0 - ch.head.rotation.x) * 0.06;
      ch.head.rotation.y = Math.sin(t * 0.6 + p) * 0.22;
      ch.group.position.y = Math.sin(t * 1.6 + p) * 0.012;
    }
    if (!walking) ch.group.rotation.z += (0 - ch.group.rotation.z) * 0.2;
    if (st.ringMat) {
      if (st.state === "working") {
        st.ringMat.opacity = 0.45 + 0.35 * Math.sin(t * 5.5);
        st.ring.scale.setScalar(1 + 0.07 * Math.sin(t * 5.5));
      } else if (st.state === "done") { st.ringMat.opacity = 0.85; st.ring.scale.setScalar(1); }
      else { st.ringMat.opacity = 0.3; st.ring.scale.setScalar(1); }
    }
    if (st.screenMat && st.state === "working") {
      st.screenMat.emissiveIntensity = 1.0 + Math.sin(t * 13 + p) * 0.25;  // screen flicker
    }
  }

  if (confetti) {
    confetti.t += dt;
    for (const pc of confetti.pieces) {
      pc.m.position.y -= pc.v * dt;
      pc.m.rotation.x += pc.r * dt; pc.m.rotation.z += pc.r * dt * 0.7;
      if (pc.m.position.y < 0.12) pc.m.position.y = 0.12;
    }
    if (confetti.t > 5) { scene.remove(confetti.group); disposeGroup(confetti.group); confetti = null; }
  }

  // gentle auto-orbit when the user hasn't touched the camera for a while
  if (performance.now() - lastInteract > 9000) orbit.theta += dt * 0.05;

  target.lerp(desired.target, 0.07);
  orbit.r = orbit.r + (desired.r - orbit.r) * 0.07;
  camera.position.set(
    target.x + orbit.r * Math.sin(orbit.phi) * Math.sin(orbit.theta),
    target.y + orbit.r * Math.cos(orbit.phi),
    target.z + orbit.r * Math.sin(orbit.phi) * Math.cos(orbit.theta)
  );
  camera.lookAt(target);
  renderer.render(scene, camera);
}
function animate() {
  requestAnimationFrame(animate);
  tick(Math.min(clock.getDelta(), 0.05));
}
animate();

/* ════════════════ Pipeline wiring (SSE live + demo) ════════════════ */
const entries = document.getElementById("entries");
const statusEl = document.getElementById("status");
const stageEl = document.getElementById("stage");
const barEl = document.querySelector("#bar i");
const elapsedEl = document.getElementById("elapsed");
const provEl = document.getElementById("prov");
const startBtn = document.getElementById("start");
const demoBtn = document.getElementById("demo");
const assignBtn = document.getElementById("assign");
let blueprint = "", running = false, t0 = 0, timer = null;

function log(msg, cls) {
  const d = document.createElement("div");
  d.className = "entry" + (cls ? " ev-" + cls : "");
  d.innerHTML = `<span class="t">${new Date().toLocaleTimeString()}</span> &nbsp;${msg}`;
  entries.prepend(d);
  while (entries.children.length > 60) entries.removeChild(entries.lastChild);
}
// Escape server-supplied text before it's interpolated into log()'s innerHTML —
// agent names in onProgress are safe (checked against the known stations map),
// but error messages come straight from the server/provider and could contain markup.
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function startTimer() {
  t0 = Date.now();
  timer = setInterval(() => {
    const s = Math.floor((Date.now() - t0) / 1000);
    elapsedEl.textContent = String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  }, 500);
}
function setStage(label) {
  stageEl.textContent = "Stage " + label;
  const m = /^(\d+)\s*\/\s*(\d+)/.exec(label);
  if (m) barEl.style.width = (100 * (+m[1]-1) / +m[2]) + "%";
}
function resetAll() {
  AGENTS.forEach(a => setState(a.name, null));
  entries.innerHTML = "";
  barEl.style.width = "0%";
  stageEl.textContent = "Stage 0 / 6 · running";
  document.getElementById("view").disabled = true;
  blueprint = "";
  updateDashboard();
}
function onProgress({ stage, agent, status }) {
  if (stage) setStage(stage);
  if (stations[agent] && !stations[agent].isBoss) {
    if (status === "start") { setState(agent, "working"); log(`▶ <b>${agent}</b> started`, "start"); }
    else if (status === "done") { setState(agent, "done"); log(`✓ <b>${agent}</b> finished`, "done"); }
    else if (status === "error") { setState(agent, "error"); log(`✗ <b>${agent}</b> errored`, "error"); }
  }
  updateDashboard();
}
function finish(bp, note) {
  running = false;
  startBtn.disabled = false; demoBtn.disabled = false; assignBtn.disabled = false;
  clearInterval(timer);
  barEl.style.width = "100%";
  stageEl.textContent = "Stage 6 / 6 · complete";
  statusEl.textContent = note || "complete";
  statusEl.classList.remove("on"); statusEl.classList.toggle("ok", !!bp);
  if (bp) {
    blueprint = bp;
    document.getElementById("view").disabled = false;
    log("📄 <b>Blueprint ready</b>", "done");
    dropConfetti();
  }
  updateDashboard();
}
// Optional shared secret for a key-protected deployment. EventSource can't
// send custom headers, so the key rides on the URL — read it from ?key= or
// a saved value so "Run team" still works once the boss has entered it.
function runKey() {
  const fromUrl = new URLSearchParams(location.search).get("key");
  if (fromUrl) { try { localStorage.setItem("nexusRunKey", fromUrl); } catch(_){} return fromUrl; }
  try { return localStorage.getItem("nexusRunKey") || ""; } catch(_) { return ""; }
}

function runLive(idea) {
  const key = runKey();
  const url = "/run/stream?idea=" + encodeURIComponent(idea) + (key ? "&key=" + encodeURIComponent(key) : "");
  const es = new EventSource(url);
  let gotAny = false, settled = false;

  // Single point of failure handling — a bare SSE connection failure fires
  // BOTH the "error" listener and the native onerror for the same event, so
  // this must be idempotent (settled guard) or the demo fallback runs twice.
  const fail = () => {
    if (settled) return;
    settled = true;
    es.close();
    if (!gotAny) {
      statusEl.textContent = "no server — running demo";
      runDemo(idea);
    } else {
      // Stream died mid-run (network blip, provider timeout, server crash).
      // Don't silently hang forever — end the run so the boss can retry.
      clearInterval(timer);
      running = false;
      startBtn.disabled = false; demoBtn.disabled = false; assignBtn.disabled = false;
      statusEl.classList.remove("on");
      statusEl.textContent = "connection lost mid-run — try again";
      log("✗ <b>Connection lost</b> — the run did not finish", "error");
    }
  };

  es.addEventListener("progress", e => { gotAny = true; onProgress(JSON.parse(e.data)); });
  es.addEventListener("done", e => {
    if (settled) return;
    settled = true;
    gotAny = true; const d = JSON.parse(e.data); es.close();
    provEl.textContent = (d.provider || "provider") + " · " + (d.model || "?");
    finish(d.blueprint, "complete · " + d.model);
  });
  es.addEventListener("error", e => {
    if (e.data) {
      try {
        const d = JSON.parse(e.data);
        log("✗ " + esc(d.error || "error"), "error");
        if (d.error === "unauthorized") { statusEl.classList.remove("on"); statusEl.textContent = "unauthorized — check the run key"; }
      } catch(_){}
    }
    fail();
  });
  // Native network-level failures (server unreachable, connection refused)
  // don't carry a data payload and only reach onerror — no addEventListener
  // "error" duplicate here, so fail() runs at most once per real failure.
  es.onerror = fail;
}
function runDemo(idea) {
  provEl.textContent = "provider: demo (simulated)";
  const seq = [
    { stage:"1/6 · Strategy",  group:[["ceo",1700]] },
    { stage:"2/6 · Market",    group:[["market",1700]] },
    { stage:"3/6 · Build",     group:[["content",2400],["sales",2400],["developer",2900],["data",2100]], parallel:true },
    { stage:"4/6 · Support",   group:[["support",1600]] },
    { stage:"5/6 · Synthesis", group:[["ceo",1700]] },
  ];
  const nameOf = id => AGENTS.find(a => a.id === id).name;
  let i = 0;
  const runStep = () => {
    if (i >= seq.length) { finish(demoBlueprint(idea), "demo complete"); return; }
    const step = seq[i++];
    setStage(step.stage);
    let remaining = step.group.length;
    step.group.forEach(([id, dur], k) => {
      setTimeout(() => {
        onProgress({ agent:nameOf(id), status:"start" });
        setTimeout(() => { onProgress({ agent:nameOf(id), status:"done" }); if (--remaining === 0) runStep(); }, dur);
      }, step.parallel ? k*140 : 0);
    });
  };
  runStep();
}
function demoBlueprint(idea) {
  return `# 🚀 Startup Blueprint (demo)\n\n**Idea:** ${idea}\n\n` +
    `Simulated run of the 3D office. Start the server (\`npm start\`) with a provider key set\n` +
    `(OpenRouter or Anthropic), then click "Run team" to generate a real blueprint written by all\n` +
    `seven trained agents: strategy & OKRs, market intelligence, a launch content kit, a sales\n` +
    `playbook, an MVP technical plan, an analytics plan, a customer-success system, and a\n` +
    `synthesized 90-day execution plan.`;
}
function begin(live) {
  if (running) return;
  const idea = document.getElementById("idea").value.trim() || "A subscription box for indie board games";
  document.getElementById("idea").value = idea;
  running = true;
  startBtn.disabled = true; demoBtn.disabled = true; assignBtn.disabled = true;
  statusEl.classList.remove("ok"); statusEl.classList.add("on");
  statusEl.textContent = live ? "running…" : "demo running…";
  resetAll(); startTimer();
  live ? runLive(idea) : runDemo(idea);
}
/* ── 🎯 Task mode: one piece of work → CEO routes → specialist executes ── */
function runTaskLive(task) {
  const key = runKey();
  const url = "/task/stream?task=" + encodeURIComponent(task) + (key ? "&key=" + encodeURIComponent(key) : "");
  const es = new EventSource(url);
  let settled = false;
  const fail = () => {
    if (settled) return;
    settled = true;
    es.close();
    clearInterval(timer);
    running = false;
    startBtn.disabled = false; demoBtn.disabled = false; assignBtn.disabled = false;
    statusEl.classList.remove("on");
    statusEl.textContent = "task failed — is the server running?";
  };
  es.addEventListener("progress", e => onProgress(JSON.parse(e.data)));
  es.addEventListener("done", e => {
    if (settled) return;
    settled = true;
    es.close();
    const d = JSON.parse(e.data);
    provEl.textContent = (d.provider || "provider") + " · " + (d.model || "?");
    const doc = "# 🎯 Task result\n\n**Task:** " + d.task +
      "\n\n**Assigned to:** " + d.assignee + " — " + d.reason +
      "\n\n---\n\n" + d.result;
    finish(doc, "task done · " + d.assignee);
    stageEl.textContent = "Task complete ✓";
    log("🎯 <b>" + esc(d.assignee) + "</b> delivered the task", "done");
    document.getElementById("bp").textContent = doc;
    document.getElementById("modal").classList.add("open");
  });
  es.addEventListener("error", e => {
    if (e.data) { try { const d = JSON.parse(e.data); log("✗ " + esc(d.error || "error"), "error"); } catch(_){} }
    fail();
  });
  es.onerror = () => fail();
}
function beginTask() {
  if (running) return;
  const task = document.getElementById("idea").value.trim();
  if (!task) { statusEl.textContent = "type a task first"; return; }
  running = true;
  startBtn.disabled = true; demoBtn.disabled = true; assignBtn.disabled = true;
  statusEl.classList.remove("ok"); statusEl.classList.add("on");
  statusEl.textContent = "task running…";
  resetAll(); startTimer();
  stageEl.textContent = "Stage 1/2 · Routing";
  runTaskLive(task);
}
assignBtn.onclick = beginTask;

startBtn.onclick = () => begin(true);
demoBtn.onclick = () => begin(false);
document.getElementById("idea").addEventListener("keydown", e => { if (e.key === "Enter") begin(true); });
document.getElementById("view").onclick = () => {
  document.getElementById("bp").textContent = blueprint;
  document.getElementById("modal").classList.add("open");
};
document.getElementById("close").onclick = () => document.getElementById("modal").classList.remove("open");
document.getElementById("download").onclick = () => {
  const blob = new Blob([blueprint], { type:"text/markdown" });
  const a = document.createElement("a");
  const href = URL.createObjectURL(blob);
  a.href = href; a.download = "startup-blueprint.md"; a.click();
  setTimeout(() => URL.revokeObjectURL(href), 0); // deferred so the download still fires first
};
if (new URLSearchParams(location.search).get("demo") === "1") setTimeout(() => begin(false), 500);

// debug handle for automated verification
window.__office = {
  ready: true, renderer, scene, camera, stations, setState,
  // Deterministically advance the simulation (wandering, animations) by N
  // seconds — lets tests verify motion even when rAF is throttled.
  step(seconds = 1) {
    const n = Math.ceil(seconds / 0.016);
    for (let i = 0; i < n; i++) tick(0.016);
  },
  snapshot(w = 640) {
    renderer.render(scene, camera);
    const src = renderer.domElement;
    const h = Math.round(w * src.height / src.width);
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    c.getContext("2d").drawImage(src, 0, 0, w, h);
    return c.toDataURL("image/jpeg", 0.72);
  },
};
</script>
