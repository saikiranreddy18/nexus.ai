<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NEXUS HQ — Virtual 3D Office</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: rgba(18, 24, 44, 0.86);
    --line: rgba(90, 130, 220, 0.22);
    --ink: #e8edff;
    --muted: #8ea0c8;
    --work: #ffcf4a;
    --done: #37e0a0;
    --err: #ff6b6b;
    --boss: #b98bff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 800px at 50% -10%, #16203c 0%, var(--bg) 60%);
    color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    overflow: hidden;
  }

  /* ── Top control bar ─────────────────────────────────────────────── */
  header {
    position: fixed; inset: 0 0 auto 0; z-index: 30;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(8,12,24,0.96), rgba(8,12,24,0.0));
  }
  header h1 { font-size: 15px; margin: 0; letter-spacing: 0.5px; white-space: nowrap; }
  header h1 span { color: var(--boss); }
  #idea {
    flex: 1; min-width: 220px; max-width: 520px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: #0c1122; color: var(--ink); font-size: 14px;
  }
  button {
    padding: 9px 16px; border-radius: 8px; border: 1px solid var(--line);
    background: #17203f; color: var(--ink); cursor: pointer; font-weight: 600;
  }
  button.primary { background: linear-gradient(180deg, #6b8bff, #4a63d8); border-color: transparent; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { color: var(--muted); font-size: 13px; margin-left: auto; white-space: nowrap; }

  /* ── 3D scene ────────────────────────────────────────────────────── */
  #scene {
    position: fixed; inset: 0; z-index: 1;
    display: grid; place-items: center;
    perspective: 1500px; perspective-origin: 50% 40%;
  }
  #room {
    position: relative; width: 900px; height: 900px;
    transform: translateY(20px) scale(var(--scale, 1)) rotateX(58deg) rotateZ(-45deg);
    transform-style: preserve-3d;
  }
  #floor {
    position: absolute; inset: 0; border-radius: 16px;
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 60px 60px,
      linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 60px 60px,
      radial-gradient(700px 700px at 50% 50%, #1a2b52 0%, #0d1428 72%);
    background-color: #0d1630;
    box-shadow: 0 0 120px rgba(60,90,180,0.25) inset;
  }
  /* Ceiling downlight pools on the floor (flat decals) */
  .light { position: absolute; left: 50%; top: 50%; width: 260px; height: 260px;
    margin: -130px 0 0 -130px; border-radius: 50%;
    transform: translate(var(--x), var(--y));
    background: radial-gradient(circle, rgba(255,247,220,0.14), transparent 68%); }
  /* Rug under the boss (flat decal) */
  .rug { position: absolute; left: 50%; top: 50%; width: 260px; height: 200px;
    margin: -100px 0 0 -130px; border-radius: 40px;
    transform: translate(var(--x), var(--y));
    background: radial-gradient(ellipse, rgba(150,110,220,0.18), rgba(150,110,220,0.04) 70%);
    border: 1px solid rgba(150,110,220,0.25); }

  /* Back walls with windows + decor */
  .wall { position: absolute; background: linear-gradient(180deg, rgba(40,56,110,0.4), rgba(14,20,44,0.06));
    border: 1px solid var(--line); }
  .wall.left  { left: 0; top: 0; width: 900px; height: 170px; transform-origin: top;  transform: rotateX(-90deg); }
  .wall.right { left: 0; top: 0; width: 170px; height: 900px; transform-origin: left; transform: rotateY(90deg); }
  .window { position: absolute; border-radius: 6px;
    background: linear-gradient(180deg, #3a6ea8 0%, #2a4d80 55%, #1c3358 100%);
    border: 3px solid #0d1428; box-shadow: 0 0 24px rgba(90,150,255,0.25) inset; }
  .wall.left  .window { top: 34px; width: 150px; height: 96px; }
  .wall.left  .window::after { content:""; position:absolute; inset:0; background:
    linear-gradient(90deg, transparent 48%, #0d1428 48%, #0d1428 52%, transparent 52%),
    linear-gradient(0deg, transparent 48%, #0d1428 48%, #0d1428 52%, transparent 52%); }
  .wall.right .window { left: 34px; width: 96px; height: 150px; }
  .wall.right .window::after { content:""; position:absolute; inset:0; background:
    linear-gradient(90deg, transparent 48%, #0d1428 48%, #0d1428 52%, transparent 52%),
    linear-gradient(0deg, transparent 48%, #0d1428 48%, #0d1428 52%, transparent 52%); }
  .clock { position: absolute; width: 58px; height: 58px; border-radius: 50%;
    background: #0e1630; border: 4px solid #33406a; }
  .clock::before, .clock::after { content:""; position:absolute; left:50%; top:50%; background:#cdd8ff; border-radius:2px; transform-origin: 0 50%; }
  .clock::before { width: 18px; height: 3px; transform: translate(0,-1.5px) rotate(-60deg); }
  .clock::after  { width: 22px; height: 3px; transform: translate(0,-1.5px) rotate(20deg); }
  .whiteboard { position:absolute; border-radius:6px; background:#f2f5ff; border:5px solid #445; padding:8px; }
  .whiteboard b { color:#2a3b7a; font-size:14px; }
  .whiteboard i { display:block; height:3px; margin:6px 0; background:#9fb0d8; border-radius:2px; }

  /* ── Workstations ────────────────────────────────────────────────── */
  .station {
    position: absolute; left: 50%; top: 50%; width: 0; height: 0;
    transform: translate(-50%, -50%) translate(var(--x), var(--y));
    transform-style: preserve-3d;
    /* per-role palette */
    --shirt:#3a4670; --hair:#241a2e; --skin:#e8b78e; --tie:#b98bff;
  }
  .station.role-ceo       { --shirt:#26407a; --hair:#2b2333; --skin:#e8b78e; --tie:#b98bff; }
  .station.role-market    { --shirt:#2f7d8c; --hair:#4a3527; --skin:#d9a06b; }
  .station.role-content   { --shirt:#c85c9e; --hair:#3a2a20; --skin:#f0c39a; }
  .station.role-developer { --shirt:#2a2f45; --hair:#1f1a24; --skin:#c98a5e; }
  .station.role-data      { --shirt:#b9902f; --hair:#141018; --skin:#e8b78e; }
  .station.role-sales     { --shirt:#c8703a; --hair:#241a12; --skin:#d9a06b; }
  .station.role-support   { --shirt:#2f8c7d; --hair:#3a2a20; --skin:#f0c39a; }
  .station.role-boss      { --shirt:#6b3fa0; --hair:#201826; --skin:#e8b78e; --tie:#ffd166; }

  /* Desk: a short 3D slab on the floor */
  .desk {
    position: absolute; left: -56px; top: -32px; width: 112px; height: 64px; border-radius: 10px;
    background: linear-gradient(180deg, #2a3a66, #223056); background-color: #243257;
    border: 1px solid rgba(120,150,230,0.35);
    box-shadow: 0 14px 22px rgba(0,0,0,0.5); transform: translateZ(14px);
  }
  .desk::after { content: ""; position: absolute; inset: -18px; border-radius: 16px;
    transform: translateZ(-14px); transition: box-shadow .3s; }

  /* Billboards face the camera by inverting the room rotation */
  .billboard { position: absolute; left: 0; top: 0; transform-style: preserve-3d; }
  .worker  { transform: translateZ(15px) rotateZ(45deg) rotateX(-58deg); }
  .deskkit { transform: translateZ(15px) rotateZ(45deg) rotateX(-58deg); }

  /* ── The person (dressed by role) ────────────────────────────────── */
  .figure { position: absolute; left: 0; bottom: 4px; width: 46px; height: 64px; margin-left: -23px; }
  .head { position: absolute; left: 50%; top: 6px; width: 24px; height: 24px; margin-left: -12px;
    border-radius: 50%; background: var(--skin); z-index: 3; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.08); }
  .hair { position: absolute; left: 50%; top: -3px; width: 28px; height: 15px; margin-left: -14px;
    border-radius: 14px 14px 10px 10px; background: var(--hair); z-index: 4; }
  .face { position: absolute; left: 50%; top: 14px; width: 24px; height: 10px; margin-left: -12px; z-index: 5; }
  .face::before, .face::after { content:""; position:absolute; top:0; width:2.6px; height:2.6px; border-radius:50%; background:#1a1f2e; }
  .face::before { left: 6px; } .face::after { right: 6px; }
  .torso { position: absolute; left: 50%; top: 26px; width: 42px; height: 34px; margin-left: -21px;
    border-radius: 16px 16px 10px 10px; background: var(--shirt); z-index: 3; }
  .torso::before, .torso::after { content:""; position:absolute; top:2px; width:10px; height:26px; border-radius:8px;
    background: var(--shirt); filter: brightness(0.88); }
  .torso::before { left: -6px; } .torso::after { right: -6px; }

  /* Accessories — hidden by default, switched on per role */
  .hood, .collar, .tie, .glasses, .headset, .beret, .crown { display: none; }
  .hood { position: absolute; left: 50%; top: 0; width: 36px; height: 32px; margin-left: -18px;
    border-radius: 18px; background: var(--shirt); z-index: 2; }
  .collar { position: absolute; left: 50%; top: 26px; margin-left: -9px; width: 18px; height: 12px;
    background: #fff; clip-path: polygon(0 0,100% 0,50% 90%); z-index: 4; }
  .tie { position: absolute; left: 50%; top: 30px; margin-left: -3px; width: 6px; height: 18px;
    background: var(--tie); clip-path: polygon(50% 0,100% 20%,78% 100%,22% 100%,0 20%); z-index: 5; }
  .glasses { position: absolute; left: 50%; top: 13px; margin-left: -11px; width: 22px; height: 8px; z-index: 6; }
  .glasses::before, .glasses::after { content:""; position:absolute; top:0; width:8px; height:8px;
    border: 1.5px solid #14243f; border-radius: 50%; background: rgba(180,210,255,0.25); }
  .glasses::before { left: 1px; } .glasses::after { right: 1px; }
  .headset { position: absolute; left: 50%; top: 1px; margin-left: -15px; width: 30px; height: 18px;
    border: 2.5px solid #222a3d; border-bottom: none; border-radius: 16px 16px 0 0; z-index: 6; }
  .headset::after { content:""; position:absolute; bottom:-7px; left:-3px; width:11px; height:2.5px; border-radius:2px;
    background:#222a3d; transform: rotate(22deg); }
  .beret { position: absolute; left: 50%; top: -6px; margin-left: -15px; width: 30px; height: 12px;
    border-radius: 14px; background: #d43f79; transform: rotate(-12deg); z-index: 5; }
  .crown { position: absolute; left: 50%; top: -17px; margin-left: -10px; font-size: 16px; z-index: 6; }

  .role-ceo .collar, .role-ceo .tie, .role-boss .collar, .role-boss .tie { display: block; }
  .role-boss .crown { display: block; }
  .role-developer .hood, .role-developer .glasses { display: block; }
  .role-market .glasses, .role-data .glasses { display: block; }
  .role-sales .headset, .role-support .headset { display: block; }
  .role-content .beret { display: block; }

  /* Desk kit: monitor + nameplate, sitting in front of the person */
  .kit { position: absolute; left: -58px; top: 12px; width: 116px; text-align: center; }
  .monitor { height: 30px; border-radius: 6px; margin-bottom: 6px; overflow: hidden; position: relative;
    background-color: #060a16; border: 1px solid rgba(120,150,230,0.3); }
  .monitor .rows { position: absolute; inset: 4px; opacity: .28; }
  .monitor .rows i { display: block; height: 3px; margin: 3px 0; border-radius: 2px; background: var(--muted); }
  .monitor .rows i:nth-child(1){ width: 80%; } .monitor .rows i:nth-child(2){ width: 55%; } .monitor .rows i:nth-child(3){ width: 68%; }
  .name { font-weight: 700; font-size: 12px; }
  .role { color: var(--muted); font-size: 10px; line-height: 1.2; }
  .chip { margin-top: 5px; font-size: 10px; font-weight: 700; letter-spacing: .3px;
    padding: 2px 8px; border-radius: 999px; display: inline-block; background: rgba(70,80,110,0.4); color: var(--muted); }

  /* ── States ──────────────────────────────────────────────────────── */
  .station.working .desk::after { box-shadow: 0 0 34px 6px rgba(255,207,74,0.5); }
  .station.working .chip { background: rgba(255,207,74,0.18); color: var(--work); }
  .station.working .figure { animation: bob 1s ease-in-out infinite; }
  .station.working .monitor .rows { animation: scroll 0.8s linear infinite; opacity: .85; }
  .station.working .monitor::after { content:""; position:absolute; left:0; right:0; height:8px;
    background: linear-gradient(180deg, rgba(255,207,74,0.55), transparent); animation: scan 1.1s linear infinite; }
  .station.done .desk::after { box-shadow: 0 0 22px 3px rgba(55,224,160,0.42); }
  .station.done .chip { background: rgba(55,224,160,0.18); color: var(--done); }
  .station.done .monitor .rows i { background: var(--done); opacity: .5; }
  .station.error .chip { background: rgba(255,107,107,0.2); color: var(--err); }
  .station.boss.active .desk::after { box-shadow: 0 0 30px 6px rgba(185,139,255,0.55); }
  .station.boss.active .figure { animation: bob 1.6s ease-in-out infinite; }

  @keyframes bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }
  @keyframes scroll { to { transform: translateY(-9px); } }
  @keyframes scan { from { top: -8px; } to { top: 34px; } }

  /* ── Props (plants, water cooler) — billboards ───────────────────── */
  .prop { position: absolute; left: 50%; top: 50%; width: 0; height: 0;
    transform: translate(-50%,-50%) translate(var(--x), var(--y)); transform-style: preserve-3d; }
  .prop .billboard { transform: translateZ(14px) rotateZ(45deg) rotateX(-58deg); }
  .plant { position: absolute; left: -18px; bottom: 2px; width: 36px; height: 60px; }
  .plant .pot { position: absolute; bottom: 0; left: 5px; width: 26px; height: 20px;
    background: linear-gradient(#c8703a,#8a4a24); border-radius: 4px 4px 8px 8px; }
  .plant .leaves { position: absolute; bottom: 15px; left: 0; width: 36px; height: 46px;
    background: radial-gradient(circle at 50% 62%, #34a065, #1f6b40); border-radius: 50% 50% 42% 42%;
    filter: drop-shadow(0 0 8px rgba(50,190,120,0.3)); }
  .cooler { position: absolute; left: -13px; bottom: 2px; width: 26px; height: 62px; }
  .cooler .bottle { position: absolute; top: 0; left: 2px; width: 22px; height: 26px;
    background: linear-gradient(180deg, rgba(120,200,255,0.6), rgba(80,150,220,0.5)); border-radius: 10px 10px 4px 4px; border: 1px solid rgba(160,210,255,0.6); }
  .cooler .base { position: absolute; bottom: 0; left: 1px; width: 24px; height: 34px;
    background: linear-gradient(180deg,#d8e2f5,#9fb0d8); border-radius: 4px; }

  /* ── Activity log ────────────────────────────────────────────────── */
  #log { position: fixed; left: 16px; bottom: 16px; z-index: 20; width: 320px; max-height: 40vh; overflow: auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; }
  #log h2 { margin: 0 0 8px; font-size: 12px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  #log .entry { font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  #log .entry b { color: var(--ink); }
  #log .t { color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ── Progress + blueprint ────────────────────────────────────────── */
  #hud { position: fixed; right: 16px; bottom: 16px; z-index: 20; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; text-align: right; min-width: 190px; }
  #stage { font-size: 13px; color: var(--muted); }
  #bar { height: 6px; border-radius: 4px; background: #16203c; margin: 8px 0; overflow: hidden; }
  #bar i { display: block; height: 100%; width: 0; background: linear-gradient(90deg,#6b8bff,#37e0a0); transition: width .4s; }
  #hud .prov { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  #hud button { width: 100%; margin-top: 6px; }

  #modal { position: fixed; inset: 0; z-index: 40; display: none; place-items: center; background: rgba(4,7,16,0.72); }
  #modal.open { display: grid; }
  #modal .sheet { width: min(860px,92vw); max-height: 86vh; overflow: auto; background: #0c1122;
    border: 1px solid var(--line); border-radius: 14px; padding: 20px 24px; }
  #modal pre { white-space: pre-wrap; word-wrap: break-word; font: 13px/1.6 ui-monospace, Menlo, monospace; color: var(--ink); }
  #modal .row { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 12px; }
  .hint { position: fixed; left: 50%; bottom: 8px; transform: translateX(-50%); color: var(--muted); font-size: 11px; z-index: 10; }
</style>
</head>
<body>
  <header>
    <h1>🏢 NEXUS <span>HQ</span></h1>
    <input id="idea" placeholder="Enter a business idea and watch your team build it…" />
    <button id="start" class="primary">▶ Run team</button>
    <button id="demo">Demo</button>
    <span id="status">idle</span>
  </header>

  <div id="scene">
    <div id="room">
      <div id="floor"></div>
      <!-- ambient light pools -->
      <div class="light" style="--x:-160px;--y:-120px"></div>
      <div class="light" style="--x:180px;--y:60px"></div>
      <div class="light" style="--x:-40px;--y:220px"></div>
      <!-- rug under the boss -->
      <div class="rug" style="--x:-20px;--y:250px"></div>

      <!-- back walls with windows + decor -->
      <div class="wall left">
        <div class="window" style="left:120px"></div>
        <div class="window" style="left:420px"></div>
        <div class="clock" style="left:660px; top:52px"></div>
      </div>
      <div class="wall right">
        <div class="window" style="top:150px"></div>
        <div class="window" style="top:430px"></div>
        <div class="whiteboard" style="top:640px; left:24px; width:120px; height:96px">
          <b>NEXUS HQ</b><i style="width:80%"></i><i style="width:60%"></i><i style="width:70%"></i>
        </div>
      </div>

      <!-- office plants + water cooler -->
      <div class="prop" style="--x:-360px;--y:-300px"><div class="billboard"><div class="plant"><div class="leaves"></div><div class="pot"></div></div></div></div>
      <div class="prop" style="--x:360px;--y:-300px"><div class="billboard"><div class="plant"><div class="leaves"></div><div class="pot"></div></div></div></div>
      <div class="prop" style="--x:-380px;--y:120px"><div class="billboard"><div class="cooler"><div class="bottle"></div><div class="base"></div></div></div></div>

      <!-- stations injected by JS -->
    </div>
  </div>

  <section id="log"><h2>Activity feed</h2><div id="entries"></div></section>

  <aside id="hud">
    <div class="prov" id="prov">provider: —</div>
    <div id="stage">Stage 0 / 6 · ready</div>
    <div id="bar"><i></i></div>
    <div id="elapsed" class="t">00:00</div>
    <button id="view" disabled>📄 View blueprint</button>
  </aside>

  <div id="modal">
    <div class="sheet">
      <div class="row"><button id="download">⬇ Download .md</button><button id="close">Close</button></div>
      <pre id="bp"></pre>
    </div>
  </div>

  <div class="hint">You are the boss 👑 — each specialist is dressed for their role and lights up as they work. “Demo” works anywhere; “Run team” needs the server.</div>

<script>
// ── Team roster. Names MUST match the server's agent names exactly. ──────────
const AGENTS = [
  { id:"ceo",       name:"CEO Assistant",           role:"Strategy · OKRs",       x:-230, y:-190 },
  { id:"market",    name:"Market Research Expert",  role:"Competitors · Pricing", x:  50, y:-250 },
  { id:"content",   name:"Content Writer",          role:"Copy · Campaigns",      x: 280, y:-130 },
  { id:"developer", name:"Developer",               role:"Architecture · MVP",    x:-290, y:  40 },
  { id:"data",      name:"Data Analyst",            role:"Metrics · Forecasts",   x: 300, y:  80 },
  { id:"sales",     name:"Sales Expert",            role:"Outreach · Closing",    x:-180, y: 210 },
  { id:"support",   name:"Customer Support Agent",  role:"Retention · FAQ",       x: 160, y: 220 },
];
const BOSS = { id:"boss", name:"YOU — The Boss", role:"Watching the team", x:-20, y:290 };

const byName = {};
const room = document.getElementById("room");

// Scale the office so its isometric footprint fits any screen.
function fitRoom() {
  const w = window.innerWidth, h = window.innerHeight;
  const scale = Math.min(1, w / 1150, (h - 60) / 920);
  room.style.setProperty("--scale", Math.max(0.42, scale).toFixed(3));
}
window.addEventListener("resize", fitRoom); fitRoom();

// Build one dressed workstation.
function station(a, isBoss) {
  const el = document.createElement("div");
  el.className = "station role-" + a.id + (isBoss ? " boss active" : "");
  el.style.setProperty("--x", a.x + "px");
  el.style.setProperty("--y", a.y + "px");
  el.innerHTML = `
    <div class="desk"></div>
    <div class="worker billboard">
      <div class="figure">
        <div class="hood"></div>
        <div class="head">
          <div class="hair"></div><div class="face"></div>
          <div class="glasses"></div><div class="headset"></div>
          <div class="beret"></div><div class="crown">👑</div>
        </div>
        <div class="torso"><div class="collar"></div><div class="tie"></div></div>
      </div>
    </div>
    <div class="deskkit billboard">
      <div class="kit">
        ${isBoss ? "" : '<div class="monitor"><div class="rows"><i></i><i></i><i></i></div></div>'}
        <div class="name">${a.name}</div>
        <div class="role">${a.role}</div>
        ${isBoss ? "" : '<div class="chip">idle</div>'}
      </div>
    </div>`;
  room.appendChild(el);
  return el;
}

AGENTS.forEach(a => { byName[a.name] = { el: station(a, false), id: a.id }; });
station(BOSS, true);

// ── State machine ───────────────────────────────────────────────────────────
function setState(name, state) {
  const s = byName[name]; if (!s) return;
  s.el.classList.remove("working", "done", "error");
  if (state) s.el.classList.add(state);
  const chip = s.el.querySelector(".chip");
  if (chip) chip.textContent = state === "working" ? "working…" : state === "done" ? "done ✓" : state === "error" ? "error" : "idle";
}

// ── Log + HUD ────────────────────────────────────────────────────────────────
const entries = document.getElementById("entries");
const statusEl = document.getElementById("status");
const stageEl = document.getElementById("stage");
const barEl = document.querySelector("#bar i");
const elapsedEl = document.getElementById("elapsed");
const provEl = document.getElementById("prov");
let t0 = 0, timer = null;

function log(msg) {
  const d = document.createElement("div");
  d.className = "entry";
  d.innerHTML = `<span class="t">${new Date().toLocaleTimeString()}</span> &nbsp;${msg}`;
  entries.prepend(d);
}
function startTimer() {
  t0 = Date.now();
  timer = setInterval(() => {
    const s = Math.floor((Date.now() - t0) / 1000);
    elapsedEl.textContent = String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  }, 500);
}
function stopTimer() { clearInterval(timer); }
function setStage(label) {
  stageEl.textContent = "Stage " + label;
  const m = /^(\d+)\s*\/\s*(\d+)/.exec(label);
  if (m) barEl.style.width = (100 * (+m[1]-1) / +m[2]) + "%";
}
function resetAll() {
  AGENTS.forEach(a => setState(a.name, null));
  entries.innerHTML = "";
  barEl.style.width = "0%";
  stageEl.textContent = "Stage 0 / 6 · running";
  document.getElementById("view").disabled = true;
  blueprint = "";
}

// ── Run handlers ─────────────────────────────────────────────────────────────
const startBtn = document.getElementById("start");
const demoBtn = document.getElementById("demo");
let blueprint = "", running = false;

function onProgress({ stage, agent, status }) {
  if (stage) setStage(stage);
  if (byName[agent]) {
    if (status === "start") { setState(agent, "working"); log(`▶ <b>${agent}</b> started`); }
    else if (status === "done") { setState(agent, "done"); log(`✓ <b>${agent}</b> finished`); }
    else if (status === "error") { setState(agent, "error"); log(`✗ <b>${agent}</b> errored`); }
  }
}
function finish(bp, note) {
  running = false;
  startBtn.disabled = false; demoBtn.disabled = false;
  stopTimer(); barEl.style.width = "100%";
  stageEl.textContent = "Stage 6 / 6 · complete";
  statusEl.textContent = note || "complete";
  document.querySelector(".station.boss").classList.remove("active");
  if (bp) { blueprint = bp; document.getElementById("view").disabled = false; log("📄 <b>Blueprint ready</b>"); }
}

// Live run via Server-Sent Events.
function runLive(idea) {
  const es = new EventSource("/run/stream?idea=" + encodeURIComponent(idea));
  let gotAny = false;
  const fail = () => { es.close(); if (!gotAny) { statusEl.textContent = "no server — running demo"; runDemo(idea); } };
  es.addEventListener("progress", e => { gotAny = true; onProgress(JSON.parse(e.data)); });
  es.addEventListener("done", e => { gotAny = true; const d = JSON.parse(e.data); es.close();
    provEl.textContent = "provider: " + (d.model || "?"); finish(d.blueprint, "complete · " + d.model); });
  es.addEventListener("error", e => {
    if (e.data) { try { const d = JSON.parse(e.data); log("✗ " + (d.error||"error")); } catch(_){} }
    fail();
  });
  es.onerror = () => { if (!gotAny) fail(); };
}

// Simulated run — mirrors the real pipeline so the office is alive with no server/key.
function runDemo(idea) {
  provEl.textContent = "provider: demo (simulated)";
  const seq = [
    { stage:"1/6 · Strategy",  group:[["ceo",1600]] },
    { stage:"2/6 · Market",    group:[["market",1600]] },
    { stage:"3/6 · Build",     group:[["content",2200],["sales",2200],["developer",2600],["data",2000]], parallel:true },
    { stage:"4/6 · Support",   group:[["support",1500]] },
    { stage:"5/6 · Synthesis", group:[["ceo",1600]] },
  ];
  const nameOf = id => AGENTS.find(a=>a.id===id).name;
  let i = 0;
  const runStep = () => {
    if (i >= seq.length) { finish(demoBlueprint(idea), "demo complete"); return; }
    const step = seq[i++];
    setStage(step.stage);
    let remaining = step.group.length;
    step.group.forEach(([id, dur], k) => {
      setTimeout(() => {
        onProgress({ agent: nameOf(id), status: "start" });
        setTimeout(() => { onProgress({ agent: nameOf(id), status: "done" }); if (--remaining === 0) runStep(); }, dur);
      }, step.parallel ? k*130 : 0);
    });
  };
  runStep();
}
function demoBlueprint(idea) {
  return `# 🚀 Startup Blueprint (demo)\n\n**Idea:** ${idea}\n\n` +
    `Simulated run of the virtual office. Start the server (\`npm start\`) with a provider key set\n` +
    `(OpenRouter or Anthropic), then click "Run team" to generate a real blueprint written by all\n` +
    `seven trained agents: strategy & OKRs, market intelligence, a launch content kit, a sales\n` +
    `playbook, an MVP technical plan, an analytics plan, a customer-success system, and a\n` +
    `synthesized 90-day execution plan.`;
}

function begin(live) {
  if (running) return;
  const idea = document.getElementById("idea").value.trim() || "A subscription box for indie board games";
  document.getElementById("idea").value = idea;
  running = true;
  startBtn.disabled = true; demoBtn.disabled = true;
  statusEl.textContent = live ? "running…" : "demo running…";
  document.querySelector(".station.boss").classList.add("active");
  resetAll(); startTimer();
  live ? runLive(idea) : runDemo(idea);
}

startBtn.onclick = () => begin(true);
demoBtn.onclick = () => begin(false);
document.getElementById("idea").addEventListener("keydown", e => { if (e.key === "Enter") begin(true); });

document.getElementById("view").onclick = () => {
  document.getElementById("bp").textContent = blueprint;
  document.getElementById("modal").classList.add("open");
};
document.getElementById("close").onclick = () => document.getElementById("modal").classList.remove("open");
document.getElementById("download").onclick = () => {
  const blob = new Blob([blueprint], { type: "text/markdown" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "startup-blueprint.md"; a.click();
};

if (new URLSearchParams(location.search).get("demo") === "1") setTimeout(() => begin(false), 400);
</script>
</body>
</html>
